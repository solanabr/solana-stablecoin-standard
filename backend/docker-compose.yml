services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sss
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sss']
      interval: 5s
      timeout: 5s
      retries: 10

  mint-burn:
    build:
      context: ..
      dockerfile: backend/mint-burn/Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sss
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8899}
      SSS_LOCKFILE_PATH: /app/sss.lock.json
      SSS_KEYPAIR_PATH: /app/secrets/id.json
      LOG_LEVEL: info
    volumes:
      - ../sss.lock.json:/app/sss.lock.json:ro
      - ${HOME}/.config/solana/id.json:/app/secrets/id.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8081:8081'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://localhost:8081/health']
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    build:
      context: ..
      dockerfile: backend/indexer/Dockerfile
    environment:
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sss
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8899}
      SSS_LOCKFILE_PATH: /app/sss.lock.json
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-3}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-4000}
      LOG_LEVEL: info
    volumes:
      - ../sss.lock.json:/app/sss.lock.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8082:8082'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://localhost:8082/health']
      interval: 10s
      timeout: 5s
      retries: 5

  compliance:
    build:
      context: ..
      dockerfile: backend/compliance/Dockerfile
    environment:
      PORT: 8083
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sss
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8899}
      SSS_LOCKFILE_PATH: /app/sss.lock.json
      SSS_KEYPAIR_PATH: /app/secrets/id.json
      LOG_LEVEL: info
    volumes:
      - ../sss.lock.json:/app/sss.lock.json:ro
      - ${HOME}/.config/solana/id.json:/app/secrets/id.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8083:8083'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '-', 'http://localhost:8083/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
