  - name: "Step 14: Brutal button CSS"
    prompt: |
      Verify brutal button CSS styles.
    validate:
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "brutal-btn"
        label: "f-119: brutal-btn class"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "6px 6px 0px"
        label: "f-120: box shadow"
      - type: file_contains
        path: "app/src/app/globals.css"
