version: "1"
config:
  agent: "claude-code"
  max_retries: 1
  step_timeout: 300
  working_directory: "."
  judge_mode: "subscription"

context: |
  SSS Frontend — HTML-to-React Verification
  Validates every element, animation, and style from reference.html is present in the Next.js React conversion.

steps:
  - name: "Step 1: Project scaffold"
    prompt: |
      Verify Next.js project structure exists with required dependencies.
    validate:
      - type: file_contains
        path: "app/package.json"
        pattern: "name"
        label: "f-01: package.json exists"
      - type: file_contains
        path: "app/tsconfig.json"
        pattern: "compilerOptions"
        label: "f-02: tsconfig.json exists"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "Config"
        label: "f-03: tailwind.config.ts exists"
      - type: file_contains
        path: "app/package.json"
        pattern: "next"
        label: "f-04: next dependency"
      - type: file_contains
        path: "app/package.json"
        pattern: "react"
        label: "f-05: react dependency"
      - type: file_contains
        path: "app/package.json"
        pattern: "tailwindcss"
        label: "f-06: tailwindcss dependency"

  - name: "Step 2: Tailwind theme"
    prompt: |
      Verify Tailwind config has custom fonts and colors matching the HTML reference.
    validate:
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "Syne"
        label: "f-07: Syne font family"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "Manrope"
        label: "f-08: Manrope font family"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "JetBrains Mono"
        label: "f-09: JetBrains Mono font family"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "display"
        label: "f-10: display font key"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "#EBE9E1"
        label: "f-11: paper color"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "#0A0A0A"
        label: "f-12: ink color"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "#FF3E00"
        label: "f-13: accent color"
      - type: file_contains
        path: "app/tailwind.config.ts"
        pattern: "#0044FF"
        label: "f-14: blue color"

  - name: "Step 3: Google Fonts"
    prompt: |
      Verify Google Fonts are loaded in the layout.
    validate:
      - type: file_contains
        path: "app/src/app/layout.tsx"
        pattern: "Syne"
        label: "f-15: Syne font loaded"
      - type: file_contains
        path: "app/src/app/layout.tsx"
        pattern: "Manrope"
        label: "f-16: Manrope font loaded"
      - type: file_contains
        path: "app/src/app/layout.tsx"
        pattern: "JetBrains_Mono"
        label: "f-17: JetBrains Mono font loaded"

  - name: "Step 4: Global styles"
    prompt: |
      Verify global CSS has all required styles from the HTML reference.
    validate:
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "::selection"
        label: "f-18: selection color"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "#FF3E00"
        label: "f-19: accent in selection"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "cursor: none"
        label: "f-20: cursor hidden"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "overflow-x: hidden"
        label: "f-21: overflow-x hidden"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "grid-bg"
        label: "f-22: grid-bg class"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "50px 50px"
        label: "f-23: 50px grid size"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "text-huge"
        label: "f-24: text-huge class"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "clamp(4rem, 15vw, 18rem)"
        label: "f-25: huge font clamp"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "scroll-behavior: smooth"
        label: "f-26: smooth scroll"

  - name: "Step 5: Custom cursor"
    prompt: |
      Verify cursor component has all required features.
    validate:
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "export default"
        label: "f-27: CustomCursor exists"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "20px"
        label: "f-28: default 20px size"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "80px"
        label: "f-29: hovered 80px size"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "#FF3E00"
        label: "f-30: vermillion color"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "difference"
        label: "f-31: mix-blend-mode difference"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "pointerEvents"
        label: "f-32: pointer-events none"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "9999"
        label: "f-33: z-index 9999"
      - type: file_contains
        path: "app/src/components/CustomCursor.tsx"
        pattern: "hover-target"
        label: "f-34: hover-target detection"

  - name: "Step 6: Preloader"
    prompt: |
      Verify preloader component has all required features.
    validate:
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "export default"
        label: "f-35: Preloader exists"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "#0A0A0A"
        label: "f-36: dark background"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "Loading Assets"
        label: "f-37: Loading Assets text"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "Standard / 01"
        label: "f-38: Standard / 01 text"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "translateY"
        label: "f-39: slide-up animation"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "9998"
        label: "f-40: z-index 9998"
      - type: file_contains
        path: "app/src/components/Preloader.tsx"
        pattern: "Math.random"
        label: "f-41: random increment"

  - name: "Step 7: Navigation"
    prompt: |
      Verify navigation component has all required elements.
    validate:
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "export default"
        label: "f-42: Navigation exists"
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "SSS."
        label: "f-43: SSS. logo"
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "Solana Open Source"
        label: "f-44: Solana Open Source text"
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "Menu"
        label: "f-45: Menu button"
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "fixed"
        label: "f-46: fixed positioning"
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "mix-blend-difference"
        label: "f-47: mix-blend-difference"

  - name: "Step 8: Hero section"
    prompt: |
      Verify hero section has all required elements and animations.
    validate:
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "export default"
        label: "f-48: Hero exists"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "Stable"
        label: "f-49: Stable text"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "Standard"
        label: "f-50: Standard text"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "text-huge"
        label: "f-51: text-huge class"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "hover:text-accent"
        label: "f-52: hover accent color"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "hover:text-blue"
        label: "f-53: hover blue color"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "brutal-btn"
        label: "f-54: brutal-btn class"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "View Source"
        label: "f-55: View Source button"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "Opinionated architecture"
        label: "f-56: reveal text line 1"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "institutional stablecoins"
        label: "f-57: reveal text line 2"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "Built to be forked"
        label: "f-58: reveal text line 3"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "modular SDK"
        label: "f-59: bottom tagline"

  - name: "Step 9: Marquee"
    prompt: |
      Verify marquee section has all required elements and animation.
    validate:
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "export default"
        label: "f-60: Marquee exists"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "MODULAR ARCHITECTURE"
        label: "f-61: marquee text 1"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "TOKEN-2022"
        label: "f-62: marquee text 2"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "PERMANENT DELEGATE"
        label: "f-63: marquee text 3"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "TRANSFER HOOKS"
        label: "f-64: marquee text 4"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "COMPLIANCE PRESETS"
        label: "f-65: marquee text 5"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "OPEN SOURCE"
        label: "f-66: marquee text 6"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "marquee"
        label: "f-67: marquee animation ref"
      - type: file_contains
        path: "app/src/components/Marquee.tsx"
        pattern: "bg-accent"
        label: "f-68: red background"

  - name: "Step 10: Stacking cards"
    prompt: |
      Verify stacking cards section has all three cards with proper content.
    validate:
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "export default"
        label: "f-69: StackingCards exists"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "The Layers"
        label: "f-70: section title"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Three distinct layers"
        label: "f-71: description"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Foundation"
        label: "f-72: card 1 title"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Base SDK"
        label: "f-73: card 1 badge"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Mint/Freeze"
        label: "f-74: card 1 tag 1"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Role Admin"
        label: "f-75: card 1 tag 2"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Capabilities"
        label: "f-76: card 2 title"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Modules"
        label: "f-77: card 2 badge"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Transfer Hooks"
        label: "f-78: card 2 tag 1"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Confidentiality"
        label: "f-79: card 2 tag 2"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Standards"
        label: "f-80: card 3 title"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "Presets"
        label: "f-81: card 3 badge"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "sss-token init --preset 2"
        label: "f-82: terminal command"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "SUCCESS"
        label: "f-83: terminal success"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "stack-card"
        label: "f-84: stack-card class (sticky via CSS)"
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "15px 15px 0px"
        label: "f-85: box-shadow in stack-card"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "bg-accent"
        label: "f-86: accent card bg"
      - type: file_contains
        path: "app/src/components/StackingCards.tsx"
        pattern: "bg-blue"
        label: "f-87: blue card bg"

  - name: "Step 11: Split presets"
    prompt: |
      Verify split presets section has SSS-01 and SSS-02 with all features.
    validate:
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "export default"
        label: "f-88: SplitPresets exists"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "SSS"
        label: "f-89: SSS label"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "01"
        label: "f-90: 01 label"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Minimal"
        label: "f-91: Minimal title"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Mint Authority"
        label: "f-92: feature 1"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Freeze Authority"
        label: "f-93: feature 2"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Metadata Core"
        label: "f-94: feature 3"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "line-through"
        label: "f-95: strikethrough"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "02"
        label: "f-96: 02 label"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Compliant"
        label: "f-97: Compliant title"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Permanent Delegate"
        label: "f-98: feature PD"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "Default Frozen State"
        label: "f-99: feature DFS"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "hover:bg-ink"
        label: "f-100: hover ink bg"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "hover:bg-accent"
        label: "f-101: hover accent bg"
      - type: file_contains
        path: "app/src/components/SplitPresets.tsx"
        pattern: "30rem"
        label: "f-102: giant bg number size"

  - name: "Step 12: Footer"
    prompt: |
      Verify footer section has all required elements.
    validate:
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "export default"
        label: "f-103: Footer exists"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Initialize Your Protocol"
        label: "f-104: tagline"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Deploy"
        label: "f-105: Deploy heading"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Now."
        label: "f-106: Now. heading"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Read The Docs"
        label: "f-107: CTA button"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "brutal-btn"
        label: "f-108: brutal-btn class"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Github"
        label: "f-109: Github link"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Twitter"
        label: "f-110: Twitter link"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Superteam"
        label: "f-111: Superteam link"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "Solana Stablecoin Standard"
        label: "f-112: SSS name"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "bg-ink"
        label: "f-113: dark bg"
      - type: file_contains
        path: "app/src/components/Footer.tsx"
        pattern: "text-huge"
        label: "f-114: text-huge heading"

  - name: "Step 13: Scroll reveal CSS"
    prompt: |
      Verify scroll reveal animation CSS exists in globals.
    validate:
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "reveal-text"
        label: "f-115: reveal-text class"
      - type: file_contains
