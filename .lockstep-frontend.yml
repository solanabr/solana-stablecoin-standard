  - name: "Step 15: Marquee CSS"
    prompt: |
      Verify marquee animation keyframes.
    validate:
      - type: file_contains
        path: "app/src/app/globals.css"
        pattern: "@keyframes marquee"
        label: "f-123: marquee keyframes"
      - type: file_contains
        path: "app/src/app/globals.css"
