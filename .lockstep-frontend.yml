  - name: "Step 16: Page composition"
    prompt: |
      Verify main page renders all components.
    validate:
      - type: file_contains
        path: "app/src/app/page.tsx"
        pattern: "export default"
        label: "f-126: page.tsx exists"
      - type: file_contains
        path: "app/src/app/page.tsx"
