      - type: file_contains
        path: "app/src/app/page.tsx"
        pattern: "Marquee"
        label: "f-131: Marquee rendered"
      - type: file_contains
        path: "app/src/app/page.tsx"
        pattern: "StackingCards"
        label: "f-132: StackingCards rendered"
      - type: file_contains
        path: "app/src/app/page.tsx"
        pattern: "SplitPresets"
        label: "f-133: SplitPresets rendered"
      - type: file_contains
        path: "app/src/app/page.tsx"
        pattern: "Footer"
        label: "f-134: Footer rendered"

  - name: "Step 17: Build passes"
    prompt: |
      Verify Next.js build succeeds.
    validate:
      - type: command_passes
        command: "cd app && npx next build 2>&1 | tail -5"
        label: "f-135: build succeeds"
