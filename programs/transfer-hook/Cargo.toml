[package]
name = "transfer-hook"
version = "0.1.0"
description = "SSS Transfer Hook: blacklist enforcement for SSS-2 compliant stablecoins"
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib", "lib"]
name = "transfer_hook"

[lints]
workspace = true

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.31.1", features = ["token_2022"] }
spl-token-2022 = { version = "6.0.0", features = ["no-entrypoint"] }
spl-tlv-account-resolution = "0.6"
spl-transfer-hook-interface = "0.6"
