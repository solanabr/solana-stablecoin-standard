[package]
name = "sss-token"
version = "0.1.0"
description = "Solana Stablecoin Standard - Token Program with blacklist, seize, freeze, and GENIUS Act compliance"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/amanhij/solana-stablecoin-standard-pre"
homepage = "https://github.com/amanhij/solana-stablecoin-standard-pre"
keywords = ["solana", "stablecoin", "token-2022", "spl", "defi"]
categories = ["cryptography::cryptocurrencies"]
readme = "../../README.md"

[lib]
crate-type = ["cdylib", "lib"]
name = "sss_token"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.31.1", features = ["token_2022"] }

