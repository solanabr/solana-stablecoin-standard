name: Node / Docker CI

on:
  push:
    branches: [main, dev]
    paths:
      - "sdk/**"
      - "cli/**"
      - "services/**"
      - "frontend/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]

jobs:
  node-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK and CLI
        run: |
          cd sdk && npm run build
          cd ../cli && npm run build

      - name: Run unit tests
        run: npm run test:unit

  docker-build:
    runs-on: ubuntu-latest
    needs: node-build
    steps:
      - uses: actions/checkout@v4

      - name: Build SDK (needed by services)
        run: |
          npm ci
          cd sdk && npm run build

      - name: Build Docker images
        run: docker compose build