name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "2.3.0"
  ANCHOR_VERSION: "0.32.1"
  RUST_TOOLCHAIN: stable

jobs:
  # ---------------------------------------------------------------------------
  # Build Solana programs with Anchor
  # ---------------------------------------------------------------------------
  build-programs:
    name: Build Programs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache Anchor / Cargo target directory
        uses: actions/cache@v4
        with:
          path: |
            target
          key: anchor-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('programs/**/*.rs') }}
          restore-keys: |
            anchor-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            anchor-build-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana installation
        run: solana --version

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Verify Anchor installation
        run: anchor --version

      - name: Generate keypair for build
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Build programs
        run: anchor build

      - name: Upload program artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-builds
          path: |
            target/deploy/*.so
            target/idl/*.json
            target/types/*.ts
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Run Anchor tests against a local validator
  # ---------------------------------------------------------------------------
  test-programs:
    name: Test Programs
    runs-on: ubuntu-latest
    needs: build-programs
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache Anchor / Cargo target directory
        uses: actions/cache@v4
        with:
          path: |
            target
          key: anchor-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('programs/**/*.rs') }}
          restore-keys: |
            anchor-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            anchor-build-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Generate keypair for tests
        run: solana-keygen new --no-bip39-passphrase --silent

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Run Anchor tests
        run: anchor test

  # ---------------------------------------------------------------------------
  # Build the TypeScript SDK (runs in parallel with build-programs)
  # ---------------------------------------------------------------------------
  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: sdk/yarn.lock

      - name: Install SDK dependencies
        working-directory: sdk
        run: yarn install --frozen-lockfile

      - name: Build SDK
        working-directory: sdk
        run: yarn build
