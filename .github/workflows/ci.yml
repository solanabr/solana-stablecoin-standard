name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "3.0.15"
  ANCHOR_VERSION: "0.32.1"

jobs:
  build-programs:
    name: Build Solana Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version
          solana-keygen new --no-bip39-passphrase

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor avm --force && avm install ${{ env.ANCHOR_VERSION }} && avm use ${{ env.ANCHOR_VERSION }}

      - name: Build programs
        run: anchor build

      - name: Cargo check (sss-token)
        run: cargo check -p sss-token

      - name: Cargo check (sss-transfer-hook)
        run: cargo check -p sss-transfer-hook

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build SDK
        working-directory: sdk
        run: |
          npm install
          npm run build

      - name: TypeScript check
        working-directory: sdk
        run: npx tsc --noEmit

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: build-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SDK deps
        working-directory: sdk
        run: npm install

      - name: Install & check backend
        working-directory: backend
        run: |
          npm install
          npx tsc --noEmit
