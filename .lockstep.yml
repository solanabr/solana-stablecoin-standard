  - name: "M: Build + Final Proof"
    prompt: |
      Verify all code in Section M (build + final proof) is correct. Do not modify any files.
    validate:
      - type: command_passes
        command: "anchor build 2>&1"
        timeout: 600
        label: "m01: anchor build succeeds"

      - type: command_output
        command: "anchor test 2>&1"
        pattern: "passing"
        timeout: 600
        label: "m02: anchor test passes all"

      - type: command_output
        command: "anchor build 2>&1 | grep 'warning:' | grep -v 'cfg.*condition' | grep -v 'deprecated.*realloc' | grep -v 'ambiguous glob' | grep -v 'generated.*warnings' | wc -l"
        pattern: "0"
        timeout: 600
        label: "m03: No Rust compiler warnings (excluding framework warnings)"

      - type: command_passes
        command: "cd sdk && npx tsc --noEmit"
        timeout: 120
        label: "m04: SDK compiles"

      - type: file_exists
        target: "target/deploy/sss_token.so"
        label: "m05: sss-token program artifact exists"

      - type: file_exists
        target: "target/deploy/sss_transfer_hook.so"
        label: "m06: sss-transfer-hook program artifact exists"

      - type: file_exists
        target: "target/idl/sss_token.json"
        label: "m07: sss-token IDL generated"

      - type: file_exists
        target: "target/idl/sss_transfer_hook.json"
        label: "m08: sss-transfer-hook IDL generated"

      - type: command_passes
        command: "grep -q 'sss_token' Anchor.toml && grep -q 'sss_transfer_hook' Anchor.toml"
        label: "m09: Anchor.toml has both programs"

      - type: command_output
        command: "grep -rn 'TODO\\|FIXME' programs/ --include='*.rs' | grep -v test | wc -l"
        pattern: "0"
        label: "m10: No TODO or FIXME in production code"
