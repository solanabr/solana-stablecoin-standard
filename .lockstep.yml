version: "1"
config:
  agent: "claude-code"
  max_retries: 1
  step_timeout: 600
  working_directory: "."
  judge_mode: "subscription"

context: |
  Solana Stablecoin Standard (SSS) — Lockstep Verification Spec v1.0
  213 validators across 13 sections. Zero room for error.
  Dual-audited by Claude + ChatGPT. Security patches verified.
  3 critical fixes + 8 hardenings + 60/60 tests.
  This is verification-only — all code already exists. Do not modify any files.

steps:
  - name: "A: Program Structure"
    prompt: |
      Verify all code in Section A (program structure) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-token/src/lib.rs"
        pattern: 'declare_id!("5ZBiFxX4ggWfNR5VhAQDRZauG6CvG84puS4SQiH8BcL4")'
        label: "a01: Program ID matches Anchor.toml"

      - type: command_passes
        command: "grep -q 'pub mod errors;' programs/sss-token/src/lib.rs && grep -q 'pub mod events;' programs/sss-token/src/lib.rs && grep -q 'pub mod instructions;' programs/sss-token/src/lib.rs && grep -q 'pub mod state;' programs/sss-token/src/lib.rs && grep -q 'pub mod utils;' programs/sss-token/src/lib.rs"
        label: "a02: All 5 modules exported"

      - type: command_passes
        command: "grep -q 'pub fn initialize(' programs/sss-token/src/lib.rs && grep -q 'pub fn mint_tokens(' programs/sss-token/src/lib.rs && grep -q 'pub fn burn_tokens(' programs/sss-token/src/lib.rs && grep -q 'pub fn freeze_account(' programs/sss-token/src/lib.rs && grep -q 'pub fn thaw_account(' programs/sss-token/src/lib.rs && grep -q 'pub fn pause(' programs/sss-token/src/lib.rs && grep -q 'pub fn unpause(' programs/sss-token/src/lib.rs && grep -q 'pub fn update_roles(' programs/sss-token/src/lib.rs && grep -q 'pub fn update_minter(' programs/sss-token/src/lib.rs && grep -q 'pub fn transfer_authority(' programs/sss-token/src/lib.rs && grep -q 'pub fn blacklist_add(' programs/sss-token/src/lib.rs && grep -q 'pub fn blacklist_remove(' programs/sss-token/src/lib.rs && grep -q 'pub fn seize(' programs/sss-token/src/lib.rs && grep -q 'pub fn attest_reserve(' programs/sss-token/src/lib.rs"
        label: "a03: All 14 instructions in lib.rs"

      - type: command_passes
        command: "grep -q 'pub mod attest_reserve;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod blacklist_add;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod blacklist_remove;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod burn;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod freeze;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod initialize;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod mint;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod pause;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod seize;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod thaw;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod transfer_authority;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod unpause;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod update_minter;' programs/sss-token/src/instructions/mod.rs && grep -q 'pub mod update_roles;' programs/sss-token/src/instructions/mod.rs"
        label: "a04: All 14 instruction modules exported"

      - type: command_passes
        command: "grep -q 'pub bump: u8' programs/sss-token/src/state/config.rs && grep -q 'pub mint: Pubkey' programs/sss-token/src/state/config.rs && grep -q 'pub master_authority: Pubkey' programs/sss-token/src/state/config.rs && grep -q 'pub name: String' programs/sss-token/src/state/config.rs && grep -q 'pub symbol: String' programs/sss-token/src/state/config.rs && grep -q 'pub uri: String' programs/sss-token/src/state/config.rs && grep -q 'pub decimals: u8' programs/sss-token/src/state/config.rs && grep -q 'pub preset: StablecoinPreset' programs/sss-token/src/state/config.rs && grep -q 'pub enable_permanent_delegate: bool' programs/sss-token/src/state/config.rs && grep -q 'pub enable_transfer_hook: bool' programs/sss-token/src/state/config.rs && grep -q 'pub default_account_frozen: bool' programs/sss-token/src/state/config.rs && grep -q 'pub enable_confidential_transfers: bool' programs/sss-token/src/state/config.rs && grep -q 'pub is_paused: bool' programs/sss-token/src/state/config.rs && grep -q 'pub total_minted: u64' programs/sss-token/src/state/config.rs && grep -q 'pub total_burned: u64' programs/sss-token/src/state/config.rs"
        label: "a05: StablecoinConfig has all fields"

      - type: file_contains
        path: "programs/sss-token/src/state/config.rs"
        pattern: 'b"config"'
        label: "a06: Config PDA seed is 'config'"

      - type: command_passes
        command: "grep -q 'SSS1' programs/sss-token/src/state/config.rs && grep -q 'SSS2' programs/sss-token/src/state/config.rs && grep -q 'SSS3' programs/sss-token/src/state/config.rs && grep -q 'Custom' programs/sss-token/src/state/config.rs"
        label: "a07: StablecoinPreset has 4 variants"

      - type: command_passes
        command: "grep -q 'pub master_authority: Pubkey' programs/sss-token/src/state/roles.rs && grep -q 'pub pauser: Pubkey' programs/sss-token/src/state/roles.rs && grep -q 'pub blacklister: Pubkey' programs/sss-token/src/state/roles.rs && grep -q 'pub seizer: Pubkey' programs/sss-token/src/state/roles.rs"
        label: "a08: RoleRegistry has all role fields"

      - type: file_contains
        path: "programs/sss-token/src/state/roles.rs"
        pattern: "pub config: Pubkey"
        label: "a09: RoleRegistry stores config pointer"

      - type: command_passes
        command: "grep -q 'pub is_active: bool' programs/sss-token/src/state/minter.rs && grep -q 'pub mint_quota: u64' programs/sss-token/src/state/minter.rs && grep -q 'pub total_minted: u64' programs/sss-token/src/state/minter.rs"
        label: "a10: MinterInfo has quota tracking"

      - type: command_passes
        command: "grep -q 'pub blocked_address: Pubkey' programs/sss-token/src/state/blacklist.rs && grep -q 'pub reason: String' programs/sss-token/src/state/blacklist.rs && grep -q 'pub blacklisted_by: Pubkey' programs/sss-token/src/state/blacklist.rs"
        label: "a11: BlacklistEntry has all fields"

      - type: command_passes
        command: "grep -q 'pub reserve_hash: \\[u8; 32\\]' programs/sss-token/src/state/reserve.rs && grep -q 'pub total_reserves_usd: u64' programs/sss-token/src/state/reserve.rs && grep -q 'pub attested_by: Pubkey' programs/sss-token/src/state/reserve.rs"
        label: "a12: ReserveAttestation has all fields"

      - type: command_passes
        command: "grep -q 'Unauthorized' programs/sss-token/src/errors.rs && grep -q 'InvalidAuthority' programs/sss-token/src/errors.rs && grep -q 'ProgramPaused' programs/sss-token/src/errors.rs && grep -q 'ProgramNotPaused' programs/sss-token/src/errors.rs && grep -q 'MinterNotActive' programs/sss-token/src/errors.rs && grep -q 'MintQuotaExceeded' programs/sss-token/src/errors.rs && grep -q 'MintAmountZero' programs/sss-token/src/errors.rs && grep -q 'BurnAmountZero' programs/sss-token/src/errors.rs && grep -q 'FeatureNotEnabled' programs/sss-token/src/errors.rs && grep -q 'BlacklistNotEnabled' programs/sss-token/src/errors.rs && grep -q 'CannotBlacklistAuthority' programs/sss-token/src/errors.rs && grep -q 'Overflow' programs/sss-token/src/errors.rs && grep -q 'SeizeAmountZero' programs/sss-token/src/errors.rs && grep -q 'SeizeSameAccount' programs/sss-token/src/errors.rs"
        label: "a13: All error codes defined"

      - type: command_passes
        command: "grep -q 'StablecoinInitialized' programs/sss-token/src/events.rs && grep -q 'TokensMinted' programs/sss-token/src/events.rs && grep -q 'TokensBurned' programs/sss-token/src/events.rs && grep -q 'AccountFrozen' programs/sss-token/src/events.rs && grep -q 'AccountThawed' programs/sss-token/src/events.rs && grep -q 'ProgramPaused' programs/sss-token/src/events.rs && grep -q 'ProgramUnpaused' programs/sss-token/src/events.rs && grep -q 'RoleUpdated' programs/sss-token/src/events.rs && grep -q 'MinterUpdated' programs/sss-token/src/events.rs && grep -q 'AuthorityTransferred' programs/sss-token/src/events.rs && grep -q 'BlacklistAdded' programs/sss-token/src/events.rs && grep -q 'BlacklistRemoved' programs/sss-token/src/events.rs && grep -q 'TokensSeized' programs/sss-token/src/events.rs && grep -q 'AuditLogRecorded' programs/sss-token/src/events.rs"
        label: "a14: All 14 event types defined"

  - name: "B: Token-2022 Extensions"
    prompt: |
      Verify all code in Section B (Token-2022 extension correctness) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "SSS1 => (false, false, false, false)"
        label: "b01: SSS-1 preset: no delegate, no hook, no frozen, no CT"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "SSS2 => (true, true, false, false)"
        label: "b02: SSS-2 preset: delegate + hook"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "SSS3 => (true, false, false, true)"
        label: "b03: SSS-3 preset: delegate + CT"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "ExtensionType::MetadataPointer"
        label: "b04: MetadataPointer extension always included"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "ExtensionType::PermanentDelegate"
        label: "b05: PermanentDelegate extension conditionally added"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "ExtensionType::TransferHook"
        label: "b06: TransferHook extension conditionally added"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "ExtensionType::ConfidentialTransferMint"
        label: "b07: ConfidentialTransferMint extension conditionally added"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "initialize_mint2"
        label: "b08: Extensions initialized BEFORE initialize_mint2"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "config_key"
        label: "b09: Mint authority set to config PDA"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "remaining_accounts"
        label: "b10: Transfer hook reads program ID from remaining_accounts"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "decimals"
        label: "b11: Decimals validated <= 18"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "Token2022"
        label: "b12: Token program is Token2022"

      - type: file_contains
        path: "programs/sss-token/src/instructions/initialize.rs"
        pattern: "emit!(StablecoinInitialized"
        label: "b13: StablecoinInitialized event emitted"

  - name: "C: Transfer Hook"
    prompt: |
      Verify all code in Section C (transfer hook program) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "declare_id!"
        label: "c01: Hook program ID matches Anchor.toml"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "SSS_TOKEN_PROGRAM_ID"
        label: "c02: SSS_TOKEN_PROGRAM_ID constant defined"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "ExtraAccountMeta::new_with_pubkey"
        label: "c03: ExtraAccountMetaList includes sss-token program literal"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "ExtraAccountMeta::new_external_pda_with_seeds"
        label: "c04: ExtraAccountMetaList includes external PDA resolution"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: 'b"config"'
        label: "c05: Config PDA seed uses 'config'"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: 'b"blacklist"'
        label: "c06: Blacklist PDA seed uses 'blacklist'"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "source_blacklist"
        label: "c07: Hook checks source_blacklist"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "dest_blacklist"
        label: "c08: Hook checks dest_blacklist"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "SourceBlacklisted"
        label: "c09: Hook returns SourceBlacklisted error"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "DestinationBlacklisted"
        label: "c10: Hook returns DestinationBlacklisted error"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "TransferHookInstruction::Execute"
        label: "c11: Fallback routes TransferHookInstruction::Execute"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "ProgramError::InvalidInstructionData"
        label: "c12: Fallback rejects non-Execute instructions"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "find_program_address"
        label: "c13: Hook verifies config PDA derivation"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "config.owner"
        label: "c14: Hook verifies config owner"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "Unauthorized"
        label: "c15: Hook has Unauthorized error variant"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "InvalidConfig"
        label: "c16: Hook has InvalidConfig error variant"

  - name: "D: Security Boundaries"
    prompt: |
      Verify all code in Section D (security boundaries) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-token/src/instructions/freeze.rs"
        pattern: "require_master_authority"
        label: "d01: freeze requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/thaw.rs"
        pattern: "require_master_authority"
        label: "d02: thaw requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/pause.rs"
        pattern: "Role::Pauser"
        label: "d03: pause requires Pauser role"

      - type: file_contains
        path: "programs/sss-token/src/instructions/unpause.rs"
        pattern: "Role::Pauser"
        label: "d04: unpause requires Pauser role"

      - type: file_contains
        path: "programs/sss-token/src/instructions/update_roles.rs"
        pattern: "require_master_authority"
        label: "d05: update_roles requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/update_minter.rs"
        pattern: "require_master_authority"
        label: "d06: update_minter requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/transfer_authority.rs"
        pattern: "require_master_authority"
        label: "d07: transfer_authority requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_add.rs"
        pattern: "Role::Blacklister"
        label: "d08: blacklist_add requires Blacklister role"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_remove.rs"
        pattern: "Role::Blacklister"
        label: "d09: blacklist_remove requires Blacklister role"

      - type: file_contains
        path: "programs/sss-token/src/instructions/seize.rs"
        pattern: "Role::Seizer"
        label: "d10: seize requires Seizer role"

      - type: file_contains
        path: "programs/sss-token/src/instructions/attest_reserve.rs"
        pattern: "require_master_authority"
        label: "d11: attest_reserve requires master_authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/mint.rs"
        pattern: "require_not_paused"
        label: "d12: mint checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/burn.rs"
        pattern: "require_not_paused"
        label: "d13: burn checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/freeze.rs"
        pattern: "require_not_paused"
        label: "d14: freeze checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/thaw.rs"
        pattern: "require_not_paused"
        label: "d15: thaw checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_add.rs"
        pattern: "require_not_paused"
        label: "d16: blacklist_add checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_remove.rs"
        pattern: "require_not_paused"
        label: "d17: blacklist_remove checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/seize.rs"
        pattern: "require_not_paused"
        label: "d18: seize checks not_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/unpause.rs"
        pattern: "is_paused"
        label: "d19: unpause checks is_paused"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_add.rs"
        pattern: "enable_permanent_delegate"
        label: "d20: blacklist_add gates on enable_permanent_delegate"

      - type: file_contains
        path: "programs/sss-token/src/instructions/seize.rs"
        pattern: "enable_permanent_delegate"
        label: "d21: seize gates on enable_permanent_delegate"

      - type: file_contains
        path: "programs/sss-token/src/instructions/update_roles.rs"
        pattern: "enable_permanent_delegate"
        label: "d22: update_roles gates Blacklister/Seizer"

      - type: file_contains
        path: "programs/sss-token/src/instructions/mint.rs"
        pattern: "is_active"
        label: "d23: mint checks minter is_active"

      - type: file_contains
        path: "programs/sss-token/src/instructions/mint.rs"
        pattern: "can_mint"
        label: "d24: mint checks can_mint(amount)"

      - type: file_contains
        path: "programs/sss-token/src/instructions/mint.rs"
        pattern: "checked_add"
        label: "d25: mint uses checked_add"

      - type: file_contains
        path: "programs/sss-token/src/instructions/transfer_authority.rs"
        pattern: "new_authority_key != ctx.accounts.authority.key()"
        label: "d26: transfer_authority rejects same address"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_add.rs"
        pattern: "CannotBlacklistAuthority"
        label: "d27: Cannot blacklist master authority"

      - type: file_contains
        path: "programs/sss-token/src/instructions/update_roles.rs"
        pattern: "MasterAuthority"
        label: "d28: update_roles rejects MasterAuthority change"

      - type: file_contains
        path: "programs/sss-token/src/state/roles.rs"
        pattern: "master_authority == *authority"
        label: "d29: MasterAuthority fallback in role check"

  - name: "E: Critical Security Fixes"
    prompt: |
      Verify all code in Section E (critical security fixes) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_remove.rs"
        pattern: "blacklist_entry.blocked_address"
        label: "e01: FIX1: BlacklistRemove binds token to blocked_address"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "pub authority: Signer"
        label: "e02: FIX2: ExtraAccountMetaList init requires authority Signer"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "find_program_address"
        label: "e03: FIX2: Hook init validates config PDA derivation"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "master_authority"
        label: "e04: FIX2: Hook init reads master_authority from config bytes"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "SSS_TOKEN_PROGRAM_ID"
        label: "e05: FIX2: Hook init verifies config owner is sss-token"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "expected_config"
        label: "e06: FIX3: Hook execute verifies config PDA"

      - type: file_contains
        path: "programs/sss-transfer-hook/src/lib.rs"
        pattern: "config.owner"
        label: "e07: FIX3: Hook execute checks config.owner"

  - name: "F: Hardening Improvements"
    prompt: |
      Verify all code in Section F (hardening improvements) is correct. Do not modify any files.
    validate:
      - type: file_contains
        path: "programs/sss-token/src/instructions/freeze.rs"
        pattern: "role_registry.config == config.key()"
        label: "f01: H1: role_registry.config in freeze"

      - type: file_contains
        path: "programs/sss-token/src/instructions/thaw.rs"
        pattern: "role_registry.config == config.key()"
        label: "f02: H1: role_registry.config in thaw"

      - type: file_contains
        path: "programs/sss-token/src/instructions/pause.rs"
        pattern: "role_registry.config == config.key()"
        label: "f03: H1: role_registry.config in pause"

      - type: file_contains
        path: "programs/sss-token/src/instructions/unpause.rs"
        pattern: "role_registry.config == config.key()"
        label: "f04: H1: role_registry.config in unpause"

      - type: file_contains
        path: "programs/sss-token/src/instructions/update_roles.rs"
        pattern: "role_registry.config == config.key()"
        label: "f05: H1: role_registry.config in update_roles"

      - type: file_contains
        path: "programs/sss-token/src/instructions/blacklist_add.rs"
        pattern: "role_registry.config == config.key()"
        label: "f06: H1: role_registry.config in blacklist_add"

      - type: file_contains
        path: "programs/sss-token/src/instructions/seize.rs"
        pattern: "role_registry.config == config.key()"
        label: "f07: H1: role_registry.config in seize"

      - type: file_contains
        path: "programs/sss-token/src/instructions/attest_reserve.rs"
        pattern: "role_registry.config == config.key()"
        label: "f08: H1: role_registry.config in attest_reserve"

      - type: file_contains
        path: "programs/sss-token/src/instructions/mint.rs"
        pattern: "mint.owner"
        label: "f09: H2: mint owner check in mint instruction"

      - type: file_contains
        path: "programs/sss-token/src/instructions/burn.rs"
        pattern: "mint.owner"
        label: "f10: H2: mint owner check in burn instruction"

      - type: file_contains
        path: "programs/sss-token/src/instructions/freeze.rs"
        pattern: "mint.owner"
