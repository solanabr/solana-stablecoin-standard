services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - RPC_URL=http://solana-validator:8899
      - NODE_ENV=production
    depends_on:
      - solana-validator
    restart: unless-stopped

  solana-validator:
    image: solanalabs/solana:v2.1.0
    command: >
      solana-test-validator
      --reset
      --bpf-program GmG49Q2d988k5C6dkTLLCihGfH5G6QVg5Rbgv54Z7iw4 target/deploy/sss_core.so
      --bpf-program 2b5HCPo4PC7w63MmUnXxuR9kwtaQpni8AXktfZHiMf2p target/deploy/sss_transfer_hook.so
    ports:
      - "8899:8899"
      - "8900:8900"
    volumes:
      - ./target/deploy:/target/deploy:ro
    restart: unless-stopped
