services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sss_backend}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - backend-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sss_backend}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sss-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ~/.config/solana/id.json:/root/.config/solana/id.json:ro
    command: ["/usr/local/bin/sss-api"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sss_backend}
      RUST_LOG: ${API_RUST_LOG:-info,sss_api=info}
      SSS_API_BIND: 0.0.0.0:8080
      SSS_RUN_WORKERS: ${SSS_RUN_WORKERS:-1}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SSS_STABLECOIN_PROGRAM_ID: ${SSS_STABLECOIN_PROGRAM_ID:-}
      SSS_AUTHORITY_KEYPAIR: ${SSS_AUTHORITY_KEYPAIR:-}
      SSS_AUTHORITY_SECRET_KEY: ${SSS_AUTHORITY_SECRET_KEY:-}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8080/healthz || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    image: sss-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    command: ["/usr/local/bin/sss-indexer"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sss_backend}
      RUST_LOG: ${INDEXER_RUST_LOG:-info,sss_indexer=info}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SSS_INDEXER_RPC_URL: ${SSS_INDEXER_RPC_URL:-}
      SSS_STABLECOIN_PROGRAM_ID: ${SSS_STABLECOIN_PROGRAM_ID:-}
      SSS_TRANSFER_HOOK_PROGRAM_ID: ${SSS_TRANSFER_HOOK_PROGRAM_ID:-6QNzPyTwg2MH778GL8idYiU3teFJiuQx6R5L7xdU17KC}
      SSS_DISABLE_BLOCK_SUBSCRIBE: ${SSS_DISABLE_BLOCK_SUBSCRIBE:-false}

volumes:
  backend-postgres-data:
