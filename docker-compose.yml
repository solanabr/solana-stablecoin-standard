version: "3.9"

services:
  sss-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ANCHOR_PROVIDER_URL=${ANCHOR_PROVIDER_URL:-https://api.devnet.solana.com}
      - ANCHOR_WALLET=${ANCHOR_WALLET:-/wallets/keypair.json}
      - SSS_MINT=${SSS_MINT}
    volumes:
      # Mount a directory containing your keypair JSON
      - ${WALLET_DIR:-./wallets}:/wallets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
