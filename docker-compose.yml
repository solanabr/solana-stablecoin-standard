version: "3.9"

services:
  mint-service:
    build:
      context: ./backend
    command: node dist/mint-service/index.js
    environment:
      RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
      HOST: 0.0.0.0
      PORT: 3001
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY}
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-65536}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      STORE_PATH: /app/data/store.json
      SSS_KEYPAIR: ${SSS_KEYPAIR:-}
      SSS_MINT: ${SSS_MINT:-}
      SSS_STABLECOIN_PROGRAM_ID: ${SSS_STABLECOIN_PROGRAM_ID:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data

  event-indexer:
    build:
      context: ./backend
    command: node dist/event-indexer/index.js
    environment:
      RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
      HOST: 0.0.0.0
      PORT: 3002
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY}
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-65536}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      STORE_PATH: /app/data/store.json
    ports:
      - "3002:3002"
    volumes:
      - ./backend/data:/app/data

  compliance-service:
    build:
      context: ./backend
    command: node dist/compliance-service/index.js
    environment:
      RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
      HOST: 0.0.0.0
      PORT: 3003
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY}
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-65536}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      STORE_PATH: /app/data/store.json
      SANCTIONS_SCREENING_URL: ${SANCTIONS_SCREENING_URL:-}
      SANCTIONS_SCREENING_API_KEY: ${SANCTIONS_SCREENING_API_KEY:-}
    ports:
      - "3003:3003"
    volumes:
      - ./backend/data:/app/data

  webhook-service:
    build:
      context: ./backend
    command: node dist/webhook-service/index.js
    environment:
      RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
      HOST: 0.0.0.0
      PORT: 3004
      SERVICE_API_KEY: ${SERVICE_API_KEY:?set SERVICE_API_KEY}
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-65536}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      STORE_PATH: /app/data/store.json
    ports:
      - "3004:3004"
    volumes:
      - ./backend/data:/app/data
