services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_WS_URL=${SOLANA_WS_URL:-}
      - SOLANA_KEYPAIR=${SOLANA_KEYPAIR:-}
      - SSS_CORE_PROGRAM_ID=${SSS_CORE_PROGRAM_ID:-Corep3pXJzUGaqpw2xzWQi4q63cn1STABiCDMJhMECB}
      - SSS_HOOK_PROGRAM_ID=${SSS_HOOK_PROGRAM_ID:-hookXMsC9txN6T8hyS9GCyubBL4nvp9XPWg5wW3z3pH}
      - API_KEY=${API_KEY:?Set API_KEY in .env}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - WEBHOOK_URLS=${WEBHOOK_URLS:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
