version: "3.9"

services:
  # ─── Core: Mint/Burn lifecycle service ───────────────────────────────────────
  mint-burn:
    build:
      context: ./services/mint-burn
      dockerfile: Dockerfile
    container_name: sss-mint-burn
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - SSS_MINT=${SSS_MINT}
      - SSS_KEYPAIR_PATH=/keys/operator.json
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgresql://sss:sss@postgres:5432/sss
    volumes:
      - ${KEYPAIR_PATH:-./keys}:/keys:ro
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Core: Event listener/indexer ────────────────────────────────────────────
  event-listener:
    build:
      context: ./services/event-listener
      dockerfile: Dockerfile
    container_name: sss-event-listener
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - WS_URL=${WS_URL:-wss://api.devnet.solana.com}
      - SSS_MINT=${SSS_MINT}
      - SSS_TOKEN_PROGRAM_ID=SSSTokenxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - PORT=3002
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgresql://sss:sss@postgres:5432/sss
      - WEBHOOK_SERVICE_URL=http://webhook:3004
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── SSS-2: Compliance service ────────────────────────────────────────────────
  compliance:
    build:
      context: ./services/compliance
      dockerfile: Dockerfile
    container_name: sss-compliance
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RPC_URL=${RPC_URL:-https://api.devnet.solana.com}
      - SSS_MINT=${SSS_MINT}
      - SSS_KEYPAIR_PATH=/keys/operator.json
      - PORT=3003
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgresql://sss:sss@postgres:5432/sss
      - CHAINALYSIS_API_KEY=${CHAINALYSIS_API_KEY:-}
      - COMPLIANCE_MODE=${COMPLIANCE_MODE:-SSS_2}
    volumes:
      - ${KEYPAIR_PATH:-./keys}:/keys:ro
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── SSS-2: Webhook service ───────────────────────────────────────────────────
  webhook:
    build:
      context: ./services/webhook
      dockerfile: Dockerfile
    container_name: sss-webhook
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3004
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DATABASE_URL=postgresql://sss:sss@postgres:5432/sss
      - MAX_RETRY_ATTEMPTS=5
      - RETRY_DELAY_MS=1000
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sss
      POSTGRES_USER: sss
      POSTGRES_PASSWORD: sss
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sss -d sss"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: