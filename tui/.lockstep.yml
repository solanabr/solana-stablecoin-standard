version: "1"

config:
  agent: "claude-code"
  max_retries: 2
  step_timeout: 30

context: |
  SSS Institutional Terminal — a Node.js TUI built with blessed and blessed-contrib.
  The app is at /home/cryptalis/TUI/admin_tui.js.
  We are validating that the TUI code is correct and all features work.
  DO NOT modify any files. These are read-only validation steps.

steps:
  - name: "Dependencies installed"
    prompt: "Verify that blessed and blessed-contrib are installed in node_modules."
    validate:
      - type: file_exists
        target: "node_modules/blessed/package.json"
      - type: file_exists
        target: "node_modules/blessed-contrib/package.json"

  - name: "No syntax errors"
    prompt: "Verify admin_tui.js has no syntax errors."
    validate:
      - type: command_passes
        command: "node --check admin_tui.js"

  - name: "Screen initialization"
    prompt: "Verify the screen is created with smartCSR and a title."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "blessed.screen"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "smartCSR: true"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "title:"

  - name: "Splash screen renders"
    prompt: "Verify the splash screen exists with logo and button."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderSplash"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "ENTER DEPLOYMENT WIZARD"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "splashScreen"

  - name: "Preset picker — all 3 presets"
    prompt: "Verify all three presets (SSS-1, SSS-2, SSS-3) are handled in the preset picker."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "SSS-1: Minimal Stablecoin"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "SSS-2: Compliant Stablecoin"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "SSS-3: Custom Configuration"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "index === 2"

  - name: "Preset state is set correctly"
    prompt: "Verify the action handler maps all 3 presets to state correctly."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "const presets = ['SSS-1', 'SSS-2', 'SSS-3']"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "presets[selected]"

  - name: "Dashboard initializes — topNav with tags"
    prompt: "Verify topNav has tags enabled and renders asset/preset/status info."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "tags: true"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "updateTopNav"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "{bold}ASSET:{/bold}"

  - name: "Side menu — all 12 tabs"
    prompt: "Verify all 12 menu items exist in the side menu."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "01. Overview"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "05. Blacklist"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "09. Attestations"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "12. Compliance API"

  - name: "Tab routing — all implemented tabs"
    prompt: "Verify renderTabContent routes to all implemented tab renderers."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderOverviewTab"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderSupplyTab"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderBlacklistTab"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderAttestationsTab"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "renderPlaceholderTab"

  - name: "Overview tab — supply and chart"
    prompt: "Verify the overview tab renders supply value, protocol configs, and the 30-day chart."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Total Supply (USD)"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Protocol Configurations"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "30-Day Supply Trajectory"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Permanent Delegate"

  - name: "Overview tab — no contrib.line (bug fix)"
    prompt: "Verify the overview chart does NOT use contrib.line() call (which causes undefined errors) and uses text-based rendering instead."
    validate:
      - type: file_not_contains
        path: "admin_tui.js"
        pattern: "contrib.line("
        is_regex: false
      - type: file_contains
        path: "admin_tui.js"
        pattern: "chartBox"

  - name: "Supply tab — mint form and audit trail"
    prompt: "Verify the supply tab has a mint form with inputs and an audit trail."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Execute Mint"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Recipient Address"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "SUBMIT MINT"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Supply Audit Trail"

  - name: "Blacklist tab — contrib.table on screen"
    prompt: "Verify the blacklist tab uses contrib.table appended to screen (not nested in box)."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "SSS-2 Enforced Blacklist"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "screenContribWidgets"

  - name: "Attestations tab — table and gauge"
    prompt: "Verify the attestations tab has a reserve attestations table and collateral gauge."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Reserve Attestations (GENIUS Act)"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "Current Collateralization Ratio"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "gauge.setPercent"

  - name: "Contrib widget cleanup on tab switch"
    prompt: "Verify contrib widgets appended to screen are properly cleaned up when switching tabs."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "screenContribWidgets.forEach"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "screen.remove"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "screenContribWidgets = []"

  - name: "Keybindings — quit and tab"
    prompt: "Verify quit keybindings and tab navigation are set up."
    validate:
      - type: file_contains
        path: "admin_tui.js"
        pattern: "escape"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "C-c"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "process.exit"
      - type: file_contains
        path: "admin_tui.js"
        pattern: "screen.key(['tab']"

  - name: "Runtime smoke test — no crash on load"
    prompt: "Verify the TUI module loads without throwing any errors."
    validate:
      - type: command_passes
        command: "node -e \"process.stdout.write=()=>true;const e=process.exit;process.exit=()=>{};require('./admin_tui.js');setTimeout(()=>{e(0)},1000)\""
        timeout: 10
