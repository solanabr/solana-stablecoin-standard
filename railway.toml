# Railway project root configuration
# Deploy 3 services: backend, frontend, docs

[project]
name = "solana-stablecoin-standard"

[build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile"

[build.args]
NEXT_PUBLIC_RPC_URL = "https://api.devnet.solana.com"
NEXT_PUBLIC_SSS_PROGRAM_ID = "2L6rZHyqhJ9VJqXhbgW7vyP3uerrw7Vzpp3qtqAq1FZj"
NEXT_PUBLIC_API_URL = "https://backend-production-ae30.up.railway.app"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
