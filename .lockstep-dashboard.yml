version: "1"
config:
  agent: "claude-code"
  max_retries: 1
  step_timeout: 300
  working_directory: "."
  judge_mode: "subscription"

context: |
  SSS Dashboard — Live Devnet Integration
  Converts the dashboard design into a Next.js route at /dashboard, wired to the
  TypeScript SDK (@stbr/sss-token) against Solana devnet. Wallet connect via
  @solana/wallet-adapter (Phantom + Solflare). All reads/writes are real on-chain.

steps:
  # ── Step 1: Dependencies ──────────────────────────────────────────────
  - name: "Step 1: Dashboard dependencies"
    prompt: |
      Verify all required npm packages are installed for wallet adapter and SDK.
    validate:
      # Wallet adapter packages
      - type: file_contains
        path: "app/package.json"
        pattern: "@solana/wallet-adapter-base"
        label: "d-01: wallet-adapter-base dep"
      - type: file_contains
        path: "app/package.json"
        pattern: "@solana/wallet-adapter-react"
        label: "d-02: wallet-adapter-react dep"
      - type: file_contains
        path: "app/package.json"
        pattern: "@solana/wallet-adapter-wallets"
        label: "d-03: wallet-adapter-wallets dep"
      # Solana core
      - type: file_contains
        path: "app/package.json"
        pattern: "@solana/web3.js"
        label: "d-04: web3.js dep"
      - type: file_contains
        path: "app/package.json"
        pattern: "@coral-xyz/anchor"
        label: "d-05: anchor dep"
      # Icons
      - type: file_contains
        path: "app/package.json"
        pattern: "lucide-react"
        label: "d-06: lucide-react dep"
      # Local SDK link
      - type: file_contains
        path: "app/package.json"
        pattern: "@stbr/sss-token"
        label: "d-07: local SDK linked"

  # ── Step 2: Wallet provider ───────────────────────────────────────────
  - name: "Step 2: Wallet provider wrapper"
    prompt: |
      Verify WalletProvider exists with devnet config, Phantom, and Solflare.
    validate:
      - type: file_contains
        path: "app/src/providers/WalletProvider.tsx"
        pattern: "ConnectionProvider"
        label: "d-08: ConnectionProvider"
      - type: file_contains
        path: "app/src/providers/WalletProvider.tsx"
        pattern: "WalletProvider"
        label: "d-09: WalletProvider"
      - type: file_contains
        path: "app/src/providers/WalletProvider.tsx"
        pattern: "PhantomWalletAdapter"
        label: "d-10: Phantom adapter"
      - type: file_contains
        path: "app/src/providers/WalletProvider.tsx"
        pattern: "SolflareWalletAdapter"
        label: "d-11: Solflare adapter"
      - type: file_contains
        path: "app/src/providers/WalletProvider.tsx"
        pattern: "Devnet"
        label: "d-12: devnet endpoint"

  # ── Step 3: SSS hook (SDK bridge) ────────────────────────────────────
  - name: "Step 3: useSSS hook"
    prompt: |
      Verify the useSSS hook wraps the SDK client for React consumption.
    validate:
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "SSSClient"
        label: "d-13: SSSClient import"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchConfig"
        label: "d-14: fetchConfig call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchRoleRegistry"
        label: "d-15: fetchRoleRegistry call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "useWallet"
        label: "d-16: useWallet integration"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "useConnection"
        label: "d-17: useConnection integration"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "getTotalSupply"
        label: "d-18: getTotalSupply call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchAllMinters"
        label: "d-19: fetchAllMinters call"

  # ── Step 4: Dashboard route + layout ──────────────────────────────────
  - name: "Step 4: Dashboard route"
    prompt: |
      Verify /dashboard route exists with wallet provider layout.
    validate:
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "export default"
        label: "d-20: dashboard page exists"
      - type: file_contains
        path: "app/src/app/dashboard/layout.tsx"
        pattern: "WalletProvider"
        label: "d-21: layout wraps WalletProvider"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "LoginScreen"
        label: "d-22: LoginScreen rendered"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "DashboardScreen"
        label: "d-23: DashboardScreen rendered"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "useWallet"
        label: "d-24: wallet state drives view"

  # ── Step 5: Shared UI components ──────────────────────────────────────
  - name: "Step 5: BrutalButton + BrutalCard"
    prompt: |
      Verify shared brutalist UI components.
    validate:
      - type: file_contains
        path: "app/src/components/ui/BrutalButton.tsx"
        pattern: "primary"
        label: "d-25: primary variant"
      - type: file_contains
        path: "app/src/components/ui/BrutalButton.tsx"
        pattern: "secondary"
        label: "d-26: secondary variant"
      - type: file_contains
        path: "app/src/components/ui/BrutalButton.tsx"
        pattern: "danger"
        label: "d-27: danger variant"
      - type: file_contains
        path: "app/src/components/ui/BrutalButton.tsx"
        pattern: "shadow-[6px_6px"
        label: "d-28: brutal shadow"
      - type: file_contains
        path: "app/src/components/ui/BrutalCard.tsx"
        pattern: "shadow-[10px_10px"
        label: "d-29: card shadow"
      - type: file_contains
        path: "app/src/components/ui/BrutalCard.tsx"
        pattern: "headerAction"
        label: "d-30: headerAction prop"

  # ── Step 6: Login screen ──────────────────────────────────────────────
  - name: "Step 6: Login screen"
    prompt: |
      Verify login/connect-wallet screen with all design elements.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Operator Authentication Required"
        label: "d-31: auth badge"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Connect"
        label: "d-32: Connect heading"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Wallet"
        label: "d-33: Wallet heading"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "WebkitTextStroke"
        label: "d-34: outline text effect"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Phantom"
        label: "d-35: Phantom button"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Solflare"
        label: "d-36: Solflare button"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "SSS."
        label: "d-37: SSS. logo"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "wallet"
        label: "d-38: real wallet connect call"

  # ── Step 7: Dashboard shell ───────────────────────────────────────────
  - name: "Step 7: Dashboard shell (sidebar + marquee)"
    prompt: |
      Verify dashboard layout: sidebar nav, marquee, disconnect.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "animate-marquee"
        label: "d-39: marquee animation"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "SYSTEM STATUS"
        label: "d-40: status marquee text"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Overview"
        label: "d-41: overview tab"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Supply"
        label: "d-42: supply tab"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Blacklist"
        label: "d-43: blacklist tab"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Roles"
        label: "d-44: roles tab"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Freeze"
        label: "d-45: freeze tab"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Disconnect"
        label: "d-46: disconnect button"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "useSSS"
        label: "d-47: useSSS hook wired"

  # ── Step 8: Overview tab (live data) ──────────────────────────────────
  - name: "Step 8: Overview tab with live devnet data"
    prompt: |
      Verify overview tab reads real supply, flags, and activity from devnet.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "totalMinted"
        label: "d-48: totalMinted display"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "totalBurned"
        label: "d-49: totalBurned display"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "currentSupply"
        label: "d-50: currentSupply display"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "State Flags"
        label: "d-51: state flags card"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "isPaused"
        label: "d-52: pause state flag"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "Recent Activity"
        label: "d-53: activity table"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/OverviewTab.tsx"
        pattern: "getSignaturesForAddress"
        label: "d-54: live tx signatures"

  # ── Step 9: Supply ops tab (mint + burn) ──────────────────────────────
  - name: "Step 9: Supply ops — mint & burn"
    prompt: |
      Verify supply tab has mint and burn forms wired to real SDK instructions.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/tabs/SupplyTab.tsx"
        pattern: "mintTokens"
        label: "d-55: mintTokens SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/SupplyTab.tsx"
        pattern: "burnTokens"
        label: "d-56: burnTokens SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/SupplyTab.tsx"
        pattern: "amount"
        label: "d-57: amount input"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/SupplyTab.tsx"
        pattern: "recipient"
        label: "d-58: recipient input"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/SupplyTab.tsx"
        pattern: "sss.client"
        label: "d-59: SDK client call"

  # ── Step 10: Blacklist tab ────────────────────────────────────────────
  - name: "Step 10: Blacklist management"
    prompt: |
      Verify blacklist tab has add/remove forms wired to SDK.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/tabs/BlacklistTab.tsx"
        pattern: "blacklistAdd"
        label: "d-60: blacklistAdd SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/BlacklistTab.tsx"
        pattern: "blacklistRemove"
        label: "d-61: blacklistRemove SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/BlacklistTab.tsx"
        pattern: "seize"
        label: "d-62: seize SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/BlacklistTab.tsx"
        pattern: "address"
        label: "d-63: address input"

  # ── Step 11: Roles tab ────────────────────────────────────────────────
  - name: "Step 11: Roles & access management"
    prompt: |
      Verify roles tab shows current roles and allows updates.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "masterAuthority"
        label: "d-64: master authority display"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "pauser"
        label: "d-65: pauser role"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "blacklister"
        label: "d-66: blacklister role"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "updateRoles"
        label: "d-67: updateRoles SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "updateMinter"
        label: "d-68: updateMinter SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/RolesTab.tsx"
        pattern: "minters"
        label: "d-69: list minters"

  # ── Step 12: Freeze/Thaw tab ─────────────────────────────────────────
  - name: "Step 12: Freeze, thaw, pause"
    prompt: |
      Verify freeze/thaw tab with pause/unpause toggle.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/tabs/FreezeTab.tsx"
        pattern: "freezeAccount"
        label: "d-70: freezeAccount SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/FreezeTab.tsx"
        pattern: "thawAccount"
        label: "d-71: thawAccount SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/FreezeTab.tsx"
        pattern: "pause"
        label: "d-72: pause SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/tabs/FreezeTab.tsx"
        pattern: "unpause"
        label: "d-73: unpause SDK call"

  # ── Step 13: Landing page link ────────────────────────────────────────
  - name: "Step 13: Landing page links to dashboard"
    prompt: |
      Verify landing page nav and buttons link to /dashboard.
    validate:
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "/dashboard"
        label: "d-74: nav links to dashboard"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "/dashboard"
        label: "d-75: hero CTA links to dashboard"

  # ── Step 14: Build passes ─────────────────────────────────────────────
  - name: "Step 14: Build passes"
    prompt: |
      Verify the full Next.js build succeeds with all dashboard code.
    validate:
      - type: command_passes
        command: "cd app && npx next build 2>&1 | tail -5"
        label: "d-76: build succeeds"
