version: "1"
config:
  agent: "claude-code"
  max_retries: 1
  step_timeout: 300
  working_directory: "."
  judge_mode: "subscription"

context: |
  SSS Dashboard V2 — Pillar Accordion Design (Dark Theme)
  Replaces the brutalist sidebar dashboard with a groundbreaking dark accordion design.
  4 expandable pillars: Supply, Compliance, Access Control, Audit Ledger.
  Each pillar wired to real @stbr/sss-token SDK on Solana devnet.
  Space Grotesk + JetBrains Mono fonts. Acid green (#D4FF00) accent.

steps:
  # ── Step 1: Dependencies still present ──────────────────────────────────
  - name: "Step 1: Dependencies intact"
    prompt: |
      Verify wallet adapter, SDK, and icon packages still installed.
    validate:
      - type: file_contains
        path: "app/package.json"
        pattern: "@solana/wallet-adapter-react"
        label: "v2-01: wallet-adapter-react"
      - type: file_contains
        path: "app/package.json"
        pattern: "@stbr/sss-token"
        label: "v2-02: SDK linked"
      - type: file_contains
        path: "app/package.json"
        pattern: "lucide-react"
        label: "v2-03: lucide icons"

  # ── Step 2: Fonts updated ───────────────────────────────────────────────
  - name: "Step 2: Space Grotesk + JetBrains Mono fonts"
    prompt: |
      Verify dashboard layout loads Space Grotesk and JetBrains Mono.
    validate:
      - type: file_contains
        path: "app/src/app/dashboard/layout.tsx"
        pattern: "Space_Grotesk"
        label: "v2-04: Space Grotesk font"
      - type: file_contains
        path: "app/src/app/dashboard/layout.tsx"
        pattern: "JetBrains_Mono"
        label: "v2-05: JetBrains Mono font"
      - type: file_contains
        path: "app/src/app/dashboard/layout.tsx"
        pattern: "WalletProvider"
        label: "v2-06: wallet provider wraps"

  # ── Step 3: Dashboard CSS (dark theme) ──────────────────────────────────
  - name: "Step 3: Dashboard dark theme styles"
    prompt: |
      Verify dashboard-specific CSS with dark theme variables and animations.
    validate:
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "D4FF00"
        label: "v2-07: acid green color"
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "030303"
        label: "v2-08: void black"
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "glitch"
        label: "v2-09: glitch animation"
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "vertical"
        label: "v2-10: vertical text"
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "pillar"
        label: "v2-11: pillar transitions"
      - type: file_contains
        path: "app/src/app/dashboard/dashboard.css"
        pattern: "noise"
        label: "v2-12: noise texture"

  # ── Step 4: Login screen ────────────────────────────────────────────────
  - name: "Step 4: Dark login screen with real wallet connect"
    prompt: |
      Verify login screen has dark theme, fingerprint icon, and real wallet connection.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Authorize"
        label: "v2-13: Authorize heading"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Connection"
        label: "v2-14: Connection heading"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Fingerprint"
        label: "v2-15: fingerprint icon"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "useWallet"
        label: "v2-16: real wallet hook"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Phantom"
        label: "v2-17: Phantom wallet option"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "Solflare"
        label: "v2-18: Solflare wallet option"
      - type: file_contains
        path: "app/src/components/dashboard/LoginScreen.tsx"
        pattern: "SSS"
        label: "v2-19: SSS branding"

  # ── Step 5: Dashboard shell (pillar accordion) ──────────────────────────
  - name: "Step 5: Pillar accordion layout"
    prompt: |
      Verify dashboard uses 4-pillar accordion layout with vertical text.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "pillar"
        label: "v2-20: pillar class"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Supply"
        label: "v2-21: supply pillar"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Compliance"
        label: "v2-22: compliance pillar"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Access"
        label: "v2-23: access pillar"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Ledger"
        label: "v2-24: ledger pillar"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "vertical-text"
        label: "v2-25: vertical text inactive"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "useSSS"
        label: "v2-26: useSSS hook wired"
      - type: file_contains
        path: "app/src/components/dashboard/DashboardScreen.tsx"
        pattern: "Power"
        label: "v2-27: disconnect/power icon"

  # ── Step 6: Supply pillar (real SDK data) ───────────────────────────────
  - name: "Step 6: Supply pillar with live data + mint/burn"
    prompt: |
      Verify supply pillar shows real supply data and has mint/burn actions.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "totalMinted"
        label: "v2-28: totalMinted display"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "totalBurned"
        label: "v2-29: totalBurned display"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "currentSupply"
        label: "v2-30: currentSupply display"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "mintTokens"
        label: "v2-31: mintTokens SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "burnTokens"
        label: "v2-32: burnTokens SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/SupplyPillar.tsx"
        pattern: "pause"
        label: "v2-33: global pause action"

  # ── Step 7: Compliance pillar (blacklist + flags) ───────────────────────
  - name: "Step 7: Compliance pillar with blacklist + feature flags"
    prompt: |
      Verify compliance pillar shows feature flags and blacklist management.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "enableTransferHook"
        label: "v2-34: transfer hook flag"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "enablePermanentDelegate"
        label: "v2-35: permanent delegate flag"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "blacklistAdd"
        label: "v2-36: blacklistAdd SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "blacklistRemove"
        label: "v2-37: blacklistRemove SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "freezeAccount"
        label: "v2-38: freezeAccount SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/CompliancePillar.tsx"
        pattern: "thawAccount"
        label: "v2-39: thawAccount SDK call"

  # ── Step 8: Access control pillar (roles + minters) ─────────────────────
  - name: "Step 8: Access control pillar with roles + minters"
    prompt: |
      Verify access control pillar shows roles and minter management.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "masterAuthority"
        label: "v2-40: master authority display"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "pauser"
        label: "v2-41: pauser role"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "blacklister"
        label: "v2-42: blacklister role"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "seizer"
        label: "v2-43: seizer role"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "updateRoles"
        label: "v2-44: updateRoles SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "updateMinter"
        label: "v2-45: updateMinter SDK call"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/AccessPillar.tsx"
        pattern: "minters"
        label: "v2-46: minters list"

  # ── Step 9: Audit ledger pillar (real tx data) ──────────────────────────
  - name: "Step 9: Audit ledger pillar with live transaction data"
    prompt: |
      Verify audit ledger shows real transaction signatures and attestation data.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/pillars/LedgerPillar.tsx"
        pattern: "getSignaturesForAddress"
        label: "v2-47: live tx signatures"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/LedgerPillar.tsx"
        pattern: "signature"
        label: "v2-48: signature display"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/LedgerPillar.tsx"
        pattern: "explorer"
        label: "v2-49: explorer links"
      - type: file_contains
        path: "app/src/components/dashboard/pillars/LedgerPillar.tsx"
        pattern: "slot"
        label: "v2-50: slot data"

  # ── Step 10: Custom cursor ──────────────────────────────────────────────
  - name: "Step 10: Custom cursor in dashboard"
    prompt: |
      Verify custom cursor with acid green theme in dashboard.
    validate:
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "award-cursor"
        label: "v2-51: cursor class"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "useWallet"
        label: "v2-52: wallet state drives view"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "LoginScreen"
        label: "v2-53: login screen import"
      - type: file_contains
        path: "app/src/app/dashboard/page.tsx"
        pattern: "DashboardScreen"
        label: "v2-54: dashboard screen import"

  # ── Step 11: Shared UI components ───────────────────────────────────────
  - name: "Step 11: MetricBlock + ActionButton components"
    prompt: |
      Verify shared dark-themed UI components for the pillar dashboard.
    validate:
      - type: file_contains
        path: "app/src/components/dashboard/MetricBlock.tsx"
        pattern: "data-glitch"
        label: "v2-55: glitch effect on hover"
      - type: file_contains
        path: "app/src/components/dashboard/MetricBlock.tsx"
        pattern: "D4FF00"
        label: "v2-56: acid highlight color"
      - type: file_contains
        path: "app/src/components/dashboard/ActionButton.tsx"
        pattern: "danger"
        label: "v2-57: danger variant"
      - type: file_contains
        path: "app/src/components/dashboard/ActionButton.tsx"
        pattern: "FF3366"
        label: "v2-58: danger red color"
      - type: file_contains
        path: "app/src/components/dashboard/ActionButton.tsx"
        pattern: "ChevronRight"
        label: "v2-59: chevron arrow"

  # ── Step 12: useSSS hook still intact ───────────────────────────────────
  - name: "Step 12: useSSS hook unchanged"
    prompt: |
      Verify the SSS hook still works with all SDK methods.
    validate:
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "SSSClient"
        label: "v2-60: SSSClient import"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchConfig"
        label: "v2-61: fetchConfig call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "getTotalSupply"
        label: "v2-62: getTotalSupply call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchAllMinters"
        label: "v2-63: fetchAllMinters call"
      - type: file_contains
        path: "app/src/hooks/useSSS.ts"
        pattern: "fetchRoleRegistry"
        label: "v2-64: fetchRoleRegistry call"

  # ── Step 13: Landing page links ─────────────────────────────────────────
  - name: "Step 13: Landing page links to dashboard"
    prompt: |
      Verify landing page still links to /dashboard.
    validate:
      - type: file_contains
        path: "app/src/components/Navigation.tsx"
        pattern: "/dashboard"
        label: "v2-65: nav links to dashboard"
      - type: file_contains
        path: "app/src/components/Hero.tsx"
        pattern: "/dashboard"
        label: "v2-66: hero CTA links to dashboard"

  # ── Step 14: Build passes ───────────────────────────────────────────────
  - name: "Step 14: Build passes"
    prompt: |
      Verify the full Next.js build succeeds with new dashboard code.
    validate:
      - type: command_passes
        command: "cd app && npx next build 2>&1 | tail -5"
        label: "v2-67: build succeeds"
