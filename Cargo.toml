[workspace]
members = [
    "programs/sss-core",
    "programs/sss-transfer-hook",
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.dependencies]
blake3 = ">=1.3.1, <1.8.0"
anchor-lang = { version = "0.32.1" }
anchor-spl = { version = "0.32.1", features = ["token_2022", "metadata"] }
spl-token-2022 = { version = "8.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "2.1.0"
spl-tlv-account-resolution = "0.11.1"
spl-discriminator = "0.5.1"
spl-token-metadata-interface = "0.7"
