[workspace]
members = [
    "programs/sss-token",
    "programs/transfer-hook",
    "programs/oracle-module",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = "0.31.1"
anchor-spl = "0.31.1"
spl-token-2022 = { version = "6", features = ["no-entrypoint"] }
spl-token-metadata-interface = "0.5"
spl-transfer-hook-interface = "0.10"
spl-tlv-account-resolution = "0.9"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

# Pin blake3 to avoid edition2024 requirement (needs Rust 1.85+)
[workspace.metadata.patch]

[patch.crates-io]
blake3 = { git = "https://github.com/BLAKE3-team/BLAKE3", tag = "1.5.5" }

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1
