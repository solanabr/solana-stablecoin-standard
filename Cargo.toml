[workspace]
members = [
    "programs/sss-token",
    # "programs/transfer-hook",
]
resolver = "2"

[workspace.dependencies]
anchor-lang    = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl     = { version = "0.32.1" }
spl-tlv-account-resolution  = "0.9"
spl-transfer-hook-interface = "0.9"
spl-type-length-value       = "0.6"
spl-pod                     = "0.3"
spl-token-2022 = "7"
solana-program = "2.3.0"
# solana-zk-token-sdk = "2.3.0"
# spl-token-2022 = { version = "10.0.0", default-features = false, features = ["no-entrypoint", "zk-ops"] }
# spl-tlv-account-resolution  = { version = "0.6.3" }
# spl-transfer-hook-interface = { version = "0.6.3" }
# spl-type-length-value       = { version = "0.4.3" }
# spl-pod                     = { version = "0.2.2" }

[profile.release]
overflow-checks = true
lto = "thin"

[profile.test]
overflow-checks = true

