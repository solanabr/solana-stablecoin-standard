[workspace]
members = [
  "programs/sss-stablecoin",
  "programs/sss-transfer-hook",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.32.1", features = ["init-if-needed", "interface-instructions"] }
anchor-spl = { version = "0.32.1", default-features = false, features = ["token", "token_2022"] }
borsh = "=0.10.3"
solana-program = "2.2.1"
spl-memo = { version = "6", features = ["no-entrypoint"] }
spl-pod = "0.5"
spl-token = { version = "8", features = ["no-entrypoint"] }
spl-token-2022 = { version = "8", features = ["no-entrypoint"] }
spl-token-metadata-interface = "0.7"
spl-tlv-account-resolution = "0.10"
spl-transfer-hook-interface = "0.10"
thiserror = "1.0"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
