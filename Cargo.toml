[workspace]
members = ["programs/*", "modules/*"]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.31.1", features = ["token_2022", "token_2022_extensions", "metadata"] }
spl-token-2022 = { version = "4.0.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = { version = "0.7.0" }
spl-tlv-account-resolution = { version = "0.7.0" }
spl-pod = { version = "0.5.0" }
spl-token-metadata-interface = { version = "0.4.0" }
