[workspace]
members = [
    "programs/*"
]
resolver = "2"

[workspace.lints.rust]
unexpected_cfgs = "allow"
deprecated = "allow"


[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[patch.crates-io]
solana-zk-token-sdk = { path = "patches/solana-zk-token-sdk" }
