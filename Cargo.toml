[workspace]
members = [
    "programs/*"
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
codegen-units = 1

[workspace.package]
rust-version = "1.75.0"

[patch.crates-io]
anchor-lang = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-spl = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-syn = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-access-control = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-account = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-constant = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-error = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-event = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-attribute-program = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-derive-accounts = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-derive-serde = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
anchor-derive-space = { git = "https://github.com/coral-xyz/anchor.git", tag = "v0.30.0" }
# Transitive Fixes
borsh = { git = "https://github.com/near/borsh-rs.git", tag = "borsh-v1.2.1" }
borsh-derive = { git = "https://github.com/near/borsh-rs.git", tag = "borsh-v1.2.1" }
proc-macro-crate = { git = "https://github.com/bkchr/proc-macro-crate", tag = "v1.3.0" }
# toml-rs suite (v0.21.1 stack for 1.75 compatibility)
toml_edit = { git = "https://github.com/toml-rs/toml.git", tag = "v0.21.1" }
toml_datetime = { git = "https://github.com/toml-rs/toml.git", tag = "toml_datetime-v0.6.3" }
toml_parser = { git = "https://github.com/toml-rs/toml.git", tag = "toml_parser-v1.0.8" }
toml = { git = "https://github.com/toml-rs/toml.git", tag = "toml-v0.8.2" }
# Cryptography stack (1.75 compat)
blake3 = { git = "https://github.com/BLAKE3-team/BLAKE3.git", tag = "1.5.5" }
constant_time_eq = { git = "https://github.com/cesarb/constant_time_eq.git", tag = "0.3.1" }




