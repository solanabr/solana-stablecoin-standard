[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
stablecoin = "Stable111111111111111111111111111111111111111"

[programs.devnet]
stablecoin = "Stable111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
"test:sss-1" = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/sss-1.ts"
"test:sss-2" = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/sss-2.ts"
"test:integration" = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/integration/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899
