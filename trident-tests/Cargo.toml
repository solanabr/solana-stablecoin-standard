[package]
name = "trident-tests"
version = "0.1.0"
edition = "2021"

# The fuzz binary entry point
[[bin]]
name = "fuzz_target"
path = "fuzz_0/src/bin/fuzz_target.rs"
doc = false

# The shared library (fuzz helpers, types, PDA derivation)
[lib]
name = "trident_tests"
path = "fuzz_0/src/lib.rs"

[dependencies]
honggfuzz = "0.5"
trident-client = "0.8"
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.32.1", features = ["token", "token_2022", "token_2022_extensions", "metadata"] }
spl-token-2022 = { version = "8", features = ["no-entrypoint"] }
arbitrary = { version = "1", features = ["derive"] }
sss-token = { path = "../programs/sss-token", features = ["no-entrypoint"] }

[workspace]
